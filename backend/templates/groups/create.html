{% extends "base.html" %}
{% block title %} — Create Group{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">Create Group</h1>
  <a href="/groups/" class="btn btn-ghost">← Back</a>
</div>

<div class="card" style="max-width:560px;padding:32px;">
  <form method="post">
    {% csrf_token %}
    <div style="margin-bottom:20px;">
      <label class="label">Group Name *</label>
      <input name="name" type="text" class="input" placeholder="e.g. Level 5 — Application Development" required>
    </div>
    <div style="margin-bottom:28px;">
      <label class="label">Subject</label>
      <input name="subject" type="text" class="input" placeholder="e.g. Application Development">
    </div>

    <div style="margin-bottom:8px;">
      <div style="font-size:15px;font-weight:700;color:#1a202c;margin-bottom:4px;">Schedule</div>
      <div style="font-size:13px;color:#64748b;margin-bottom:16px;">Add one or more lesson times per week.</div>
    </div>

    <div id="schedules">
      <div class="schedule-row" style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:10px;align-items:end;margin-bottom:12px;">
        <div>
          <label class="label">Day</label>
          <select name="day" class="input">
            <option value="0">Monday</option>
            <option value="1">Tuesday</option>
            <option value="2">Wednesday</option>
            <option value="3">Thursday</option>
            <option value="4">Friday</option>
            <option value="5">Saturday</option>
            <option value="6">Sunday</option>
          </select>
        </div>
        <div>
          <label class="label">Start</label>
          <input name="start_time" type="time" class="input" value="12:00">
        </div>
        <div>
          <label class="label">End</label>
          <input name="end_time" type="time" class="input" value="13:20">
        </div>
        <div style="padding-bottom:1px;">
          <button type="button" onclick="removeRow(this)" style="background:#fee2e2;color:#991b1b;border:none;border-radius:8px;padding:10px 12px;cursor:pointer;font-size:16px;">×</button>
        </div>
      </div>
    </div>

    <button type="button" onclick="addRow()" style="background:#f1f5f9;border:1px dashed #cbd5e1;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:600;color:#64748b;cursor:pointer;width:100%;margin-bottom:28px;">
      + Add another day
    </button>

    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;">
      Create Group
    </button>
  </form>
</div>

<script>
function addRow() {
  const container = document.getElementById("schedules");
  const first = container.querySelector(".schedule-row");
  const clone = first.cloneNode(true);
  container.appendChild(clone);
}
function removeRow(btn) {
  const rows = document.querySelectorAll(".schedule-row");
  if (rows.length > 1) btn.closest(".schedule-row").remove();
}
</script>
{% endblock %}

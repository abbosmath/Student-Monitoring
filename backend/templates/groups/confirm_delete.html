{% extends "base.html" %}
{% block title %} — Delete Group{% endblock %}
{% block content %}
<div style="max-width:460px;margin:60px auto;text-align:center;">
  <div class="card" style="padding:40px;">
    <div style="font-size:48px;margin-bottom:16px;">⚠️</div>
    <h2 style="font-size:20px;font-weight:700;color:#1a202c;margin-bottom:8px;">Delete "{{ group.name }}"?</h2>
    <p style="color:#64748b;font-size:14px;margin-bottom:28px;">This will permanently delete the group and all its attendance records. This cannot be undone.</p>
    <div style="display:flex;gap:12px;justify-content:center;">
      <a href="/groups/{{ group.id }}/" class="btn btn-ghost">Cancel</a>
      <form method="post" style="display:inline;">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block auth_content %}
<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>EduTrack — Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'DM Sans', sans-serif; }
    body { background: #0f1117; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #1a1d27; border: 1px solid rgba(255,255,255,0.07); border-radius: 16px; padding: 40px; width: 100%; max-width: 380px; }
    .input { width: 100%; padding: 11px 14px; background: #0f1117; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: white; font-size: 14px; outline: none; box-sizing: border-box; transition: border 0.15s; }
    .input:focus { border-color: #6366f1; }
    .label { display: block; font-size: 13px; font-weight: 600; color: #64748b; margin-bottom: 6px; }
    .btn { width: 100%; padding: 12px; background: #6366f1; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
    .btn:hover { background: #4f46e5; }
    ::placeholder { color: #374151; }
  </style>
</head>
<body>
<div class="card">
  <div style="margin-bottom:28px;">
    <div style="font-size:22px;font-weight:700;color:white;">EduTrack<span style="display:inline-block;width:7px;height:7px;background:#6366f1;border-radius:50%;margin-left:2px;margin-bottom:2px;vertical-align:middle;"></span></div>
    <div style="color:#64748b;font-size:14px;margin-top:6px;">Create your teacher account</div>
  </div>

  {% if error %}
    <div style="background:#fee2e2;color:#991b1b;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:20px;">{{ error }}</div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div style="margin-bottom:14px;">
      <label class="label">Full name</label>
      <input name="full_name" type="text" class="input" placeholder="Javohir Fayzullayev" required>
    </div>
    <div style="margin-bottom:14px;">
      <label class="label">Subject</label>
      <input name="subject" type="text" class="input" placeholder="Application development">
    </div>
    <div style="margin-bottom:14px;">
      <label class="label">Username</label>
      <input name="username" type="text" class="input" placeholder="username" required>
    </div>
    <div style="margin-bottom:24px;">
      <label class="label">Password</label>
      <input name="password" type="password" class="input" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn">Create Account</button>
  </form>

  <div style="text-align:center;margin-top:20px;font-size:13px;color:#4a5568;">
    Already have an account?
    <a href="/auth/login/" style="color:#818cf8;font-weight:600;text-decoration:none;">Sign in</a>
  </div>
</div>
</body>
</html>
{% endblock %}

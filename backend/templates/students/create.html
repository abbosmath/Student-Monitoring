{% extends "base.html" %}
{% block title %} — New Student{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">New Student</h1>
  <a href="/students/" class="btn btn-ghost">← Back</a>
</div>

<div class="card" style="max-width:480px;padding:32px;">
  <form method="post">
    {% csrf_token %}
    <div style="margin-bottom:20px;">
      <label class="label">Student Full Name *</label>
      <input name="full_name" type="text" class="input" placeholder="e.g. Abdulaziz Ravshanovich" required autofocus>
    </div>

    <div style="background:#f8fafc;border-radius:10px;padding:16px;margin-bottom:24px;font-size:13px;color:#64748b;line-height:1.6;">
      📱 <strong style="color:#1a202c;">How to link parent later:</strong><br>
      1. Parent opens your bot and sends <code style="background:#e2e8f0;padding:2px 5px;border-radius:4px;">/start</code><br>
      2. Bot gives them their Telegram ID<br>
      3. Go to <strong>Edit Student</strong> → paste the ID → Save
    </div>

    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;">
      Create Student
    </button>
  </form>
</div>
{% endblock %}

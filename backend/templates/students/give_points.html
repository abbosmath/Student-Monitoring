{% extends "base.html" %}
{% block title %} — Give Points{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">Give Points</h1>
  <a href="/students/{{ student.id }}/" class="btn btn-ghost">← Back</a>
</div>

<div class="card" style="max-width:400px;padding:32px;">
  <div style="display:flex;align-items:center;gap:14px;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid #f1f5f9;">
    <div style="width:48px;height:48px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:white;flex-shrink:0;">
      {{ student.full_name|first|upper }}
    </div>
    <div>
      <div style="font-weight:700;color:#1a202c;">{{ student.full_name }}</div>
      <div style="font-size:13px;color:#64748b;">Current: <strong style="color:#6366f1;">{{ student.total_points }} pts</strong></div>
    </div>
  </div>

  <form method="post">
    {% csrf_token %}
    <div style="margin-bottom:20px;">
      <label class="label">Points to Add</label>
      <input name="points" type="number" class="input" placeholder="e.g. 10" min="1" max="100" required autofocus>
    </div>
    <div style="margin-bottom:28px;">
      <label class="label">Comment (optional)</label>
      <input name="comment" type="text" class="input" placeholder="e.g. Excellent homework">
    </div>
    <button type="submit" class="btn btn-warning" style="width:100%;justify-content:center;padding:12px;">
      ⭐ Give Points
    </button>
  </form>
</div>
{% endblock %}

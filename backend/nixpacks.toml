[phases.setup]
nixPkgs = ["python311Full"]

[phases.install]
cmds = ["python3.11 -m ensurepip && python3.11 -m pip install -r requirements.txt"]

[phases.build]
cmds = ["python manage.py collectstatic --noinput", "python manage.py migrate"]

[start]
cmd = "gunicorn config.wsgi --bind 0.0.0.0:$PORT --workers 2"